<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📥 YouTube Downloader</h1>
        <p class="subtitle">Tải video chất lượng cao miễn phí</p>

        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Dán link YouTube vào đây...">
            <button onclick="fetchVideoData()">🔍 Tìm Video</button>
        </div>

        <div id="loading" class="hidden">⏳ Đang xử lý, vui lòng chờ...</div>
        <div id="error" class="hidden error-msg"></div>

        <div id="result" class="hidden">
            <div class="video-card">
                <img id="thumb" src="" alt="Thumbnail">
                <div class="video-details">
                    <h3 id="title">Tiêu đề video...</h3>
                    <p id="channel">Kênh: ...</p>
                    <p id="duration">Thời lượng: ...</p>
                </div>
            </div>

            <div class="download-section">
                <h4>📥 Chọn định dạng tải:</h4>
                <div id="downloadList" class="download-list">
                    <!-- Nút tải sẽ được tạo ở đây -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
